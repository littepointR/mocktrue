name: Feature request
description: Propose a new capability or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user workflow should this improve?
      placeholder: Describe the end goal.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should MockTrue do?
      placeholder: Describe the expected UI, API, or runtime behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Mention any workaround or alternative design.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - ...
