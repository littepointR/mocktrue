name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests with coverage
        run: pnpm run test:coverage

      - name: Type-check frontend
        run: pnpm exec vue-tsc --noEmit

      - name: Build frontend
        run: pnpm run build:dev

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run GUI smoke tests
        run: pnpm run e2e:smoke

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux backend dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            pkg-config \
            socat

      - name: Download Go modules
        run: go mod download

      - name: Run backend coverage floor
        run: ./scripts/check-go-coverage.sh

  backend-matrix:
    name: backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux backend dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            pkg-config \
            socat

      - name: Download Go modules
        run: go mod download

      - name: Run core and serial backend tests
        run: go test ./internal/core/... ./internal/modules/serial/... -count=1

      - name: Run opt-in integration packages without hardware
        run: go test -tags integration -timeout 120s ./tests/go/integration ./tests/automation/integration -count=1

  backend:
    name: backend
    runs-on: ubuntu-latest
    needs: backend-matrix
    if: always()
    steps:
      - name: Verify backend matrix succeeded
        run: |
          if [ "${{ needs.backend-matrix.result }}" != "success" ]; then
            echo "backend-matrix result: ${{ needs.backend-matrix.result }}"
            exit 1
          fi
